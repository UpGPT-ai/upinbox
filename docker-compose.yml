# UpInbox — Minimal self-hosting docker-compose example.
#
# This is a minimal example to get UpInbox running in a single container.
# Production users should put a reverse proxy (Caddy or Nginx) in front of
# this service to terminate SSL/TLS and forward to port 3000.
#
# See SELF-HOSTING.md for full production setup, reverse proxy examples,
# backup guidance, and operational notes.

services:
  upinbox:
    build: .
    container_name: upinbox
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CRON_SECRET=${CRON_SECRET}
      - UPGPT_LICENSE_DEV_MODE=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/upinbox/health"]
      interval: 30s
      timeout: 10s
      retries: 3
